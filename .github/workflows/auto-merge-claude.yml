# Auto-merge claude/* branches into main, then delete the source branch.
# Triggered on push to claude/** or manually via workflow_dispatch.
name: Auto-merge Claude branches

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Claude branch to merge into main (e.g. claude/my-feature)'
        required: true
        default: 'claude/'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target branch
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ inputs.branch }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch claude branch
        run: git fetch origin ${{ steps.target.outputs.branch }}

      - name: Merge into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge origin/${{ steps.target.outputs.branch }} --no-edit -m "Auto-merge ${{ steps.target.outputs.branch }} into main"
          git push origin main

      - name: Delete claude branch
        run: git push origin --delete ${{ steps.target.outputs.branch }}
